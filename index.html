<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Tajawal', sans-serif; background: #fafafa; }
      @media (prefers-color-scheme: dark) {
        body { background: #1a1a1a; color: #e0e0e0; }
      }
      :root {
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #666;
        --color-text-tertiary: #999;
        --color-text-info: #1B3A5C;
        --color-background-primary: #fff;
        --color-background-secondary: #f5f5f5;
        --color-background-info: #EBF0F7;
        --color-border-tertiary: #e0e0e0;
        --color-border-secondary: #ccc;
        --color-border-info: #B8CCE4;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-text-primary: #e0e0e0;
          --color-text-secondary: #aaa;
          --color-text-tertiary: #777;
          --color-text-info: #B8CCE4;
          --color-background-primary: #2a2a2a;
          --color-background-secondary: #333;
          --color-background-info: #1B3A5C33;
          --color-border-tertiary: #444;
          --color-border-secondary: #555;
          --color-border-info: #1B3A5C66;
        }
      }
    </style>
  </head>
